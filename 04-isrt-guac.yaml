---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: guac
  namespace: guac
  # annotations:
  #   traefik.ingress.kubernetes.io/router.entrypoints: websecure
  #   traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`guac.apps.lab.lan`)
      kind: Rule
      services:
        - name: guac
          port: 8080
